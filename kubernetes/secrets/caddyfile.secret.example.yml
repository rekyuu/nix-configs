apiVersion: v1
kind: ConfigMap
metadata:
  name: caddyfile
data:
  Caddyfile: |-
    {
      servers {
        trusted_proxies cloudflare
        client_ip_headers Cf-Connecting-Ip
      }
    }

    {$DOMAIN}, *.{$DOMAIN} {
      tls internal

      @root host {$DOMAIN}
      handle @root {
        respond "Hello!"
      }

      @argocd host argo-cd.{$DOMAIN}
      handle @argocd {
        reverse_proxy argocd-server.argocd.svc.cluster.local:80
      }

      handle {
        redir https://{$DOMAIN}
      }
    }