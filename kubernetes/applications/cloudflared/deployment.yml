# https://developers.cloudflare.com/tunnel/deployment-guides/kubernetes/
# In the Cloudflare Tunnel settings, you need to go to Zero Trust > Networks > Connectors 
#   and for each route, click on "Origin request and connection settings" > TLS
#   - Add Origin Server Name, should be the same as the route URL
#   - Enable "No TLS Verify"
# In the Domain settings, go to SSL/TLS > Overview, and configer as "Full"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: default
spec:
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      pod: cloudflared
  replicas: 2
  template:
    metadata:
      labels:
        pod: cloudflared
    spec:
      securityContext:
        sysctls:
          # Allows ICMP traffic (ping, traceroute) to resources behind cloudflared.
          - name: net.ipv4.ping_group_range
            value: "65532 65532"
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          imagePullPolicy: Always
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-secrets
                  key: cloudflared-token
          command:
            - cloudflared
            - tunnel
            - --no-autoupdate
            - --loglevel
            - info
            - --metrics
            - 0.0.0.0:2000
            - run
          livenessProbe:
            httpGet:
              # Cloudflared has a /ready endpoint which returns 200 if and only if
              # it has an active connection to Cloudflare's network.
              path: /ready
              port: 2000
            failureThreshold: 1
            initialDelaySeconds: 10
            periodSeconds: 10